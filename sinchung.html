<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무료 학습 진단 신청 | 둔산 맞춤과외</title>
  <meta name="description" content="대전 둔산동·탄방동 중고등 수학 1:1 맞춤 과외 무료 학습 진단 신청 페이지" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#071936',
            navy: '#061B3D',
            blue: '#1F58B7',
            pale: '#F7F8FA',
            kakao: '#20C55A',
            orange: '#F47A20'
          },
          boxShadow: {
            soft: '0 12px 30px rgba(7, 25, 54, 0.16)',
            card: '0 8px 22px rgba(7, 25, 54, 0.10)'
          }
        }
      }
    };
  </script>
  <style>
    body {
      margin: 0;
      font-family: "Pretendard Variable", Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      word-break: keep-all;
      background: #e8eef7;
      color: #071936;
    }

    .mobile-frame {
      width: min(100%, 432px);
      margin: 0 auto;
      min-height: 100svh;
      background: linear-gradient(180deg, #fffdf7 0%, #f7f9ff 46%, #ffffff 100%);
    }

    @media (min-width: 700px) {
      .mobile-frame {
        margin-top: 28px;
        margin-bottom: 28px;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(7, 25, 54, 0.22);
      }
    }

    .blue-gradient {
      background: linear-gradient(135deg, #061b3d 0%, #1f58b7 100%);
    }

    .field:focus {
      outline: none;
      border-color: #1F58B7;
      box-shadow: 0 0 0 4px rgba(31, 88, 183, 0.12);
    }

    .option-input:checked + span {
      border-color: #1F58B7;
      background: #eff5ff;
      color: #1F58B7;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="mobile-frame">
    <header class="flex h-[54px] items-center justify-between bg-white px-[20px] shadow-[0_3px_12px_rgba(7,25,54,0.12)]">
      <a href="./a.html" class="flex items-center gap-2 text-ink" aria-label="랜딩페이지로 돌아가기">
        <svg width="25" height="25" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="text-[15px] font-extrabold">돌아가기</span>
      </a>
      <p class="text-[17px] font-black text-ink">무료 학습 진단</p>
      <span class="w-[72px]"></span>
    </header>

    <main class="px-[18px] pb-[28px] pt-[18px]">
      <section class="blue-gradient rounded-[18px] px-[20px] py-[22px] text-white shadow-soft">
        <p class="text-[14px] font-bold text-white/80">1:1 맞춤 수업 전</p>
        <h1 class="mt-2 text-[29px] font-black leading-[1.2] tracking-[-0.04em]">
          우리 아이 수학 상태를<br />먼저 진단해보세요
        </h1>
        <p class="mt-4 text-[15px] font-medium leading-[1.7] text-white/90">
          학년, 학교, 현재 고민을 남겨주시면 확인 후 맞춤 학습 방향을 안내드립니다.
        </p>
      </section>

      <form id="consultForm" class="mt-[16px] space-y-[14px] rounded-[18px] bg-white px-[16px] py-[18px] shadow-card ring-1 ring-slate-100">
        <input type="hidden" name="source" value="sinchung.html" />

        <section>
          <h2 class="text-[18px] font-black text-ink">기본 정보</h2>
          <div class="mt-3 space-y-3">
            <label class="block">
              <span class="text-[14px] font-bold text-ink">학부모님 연락처 <b class="text-orange">*</b></span>
              <input class="field mt-2 w-full rounded-[10px] border border-slate-200 px-4 py-3 text-[15px]" type="tel" name="parentPhone" placeholder="010-0000-0000" required />
            </label>
            <label class="block">
              <span class="text-[14px] font-bold text-ink">학생 학년 <b class="text-orange">*</b></span>
              <input class="field mt-2 w-full rounded-[10px] border border-slate-200 px-4 py-3 text-[15px]" type="text" name="grade" placeholder="예: 중3, 고1" required />
            </label>
            <label class="block">
              <span class="text-[14px] font-bold text-ink">학교명 <b class="text-orange">*</b></span>
              <input class="field mt-2 w-full rounded-[10px] border border-slate-200 px-4 py-3 text-[15px]" type="text" name="school" placeholder="예: 탄방중, 충남고, 문정초" required />
            </label>
          </div>
        </section>

        <section class="border-t border-slate-100 pt-4">
          <h2 class="text-[18px] font-black text-ink">현재 수학 상태</h2>
          <div class="mt-3 grid grid-cols-2 gap-2">
            <label>
              <input class="option-input hidden" type="radio" name="mathLevel" value="기초 개념이 약함" />
              <span class="block rounded-[10px] border border-slate-200 px-3 py-3 text-center text-[14px] font-semibold text-slate-600">기초 개념이 약함</span>
            </label>
            <label>
              <input class="option-input hidden" type="radio" name="mathLevel" value="문제 풀이가 느림" />
              <span class="block rounded-[10px] border border-slate-200 px-3 py-3 text-center text-[14px] font-semibold text-slate-600">문제 풀이가 느림</span>
            </label>
            <label>
              <input class="option-input hidden" type="radio" name="mathLevel" value="실수가 많음" />
              <span class="block rounded-[10px] border border-slate-200 px-3 py-3 text-center text-[14px] font-semibold text-slate-600">실수가 많음</span>
            </label>
            <label>
              <input class="option-input hidden" type="radio" name="mathLevel" value="내신 점수가 안 오름" />
              <span class="block rounded-[10px] border border-slate-200 px-3 py-3 text-center text-[14px] font-semibold text-slate-600">내신 점수가 안 오름</span>
            </label>
          </div>
          <label class="mt-3 block">
            <span class="text-[14px] font-bold text-ink">현재 점수 또는 등급</span>
            <input class="field mt-2 w-full rounded-[10px] border border-slate-200 px-4 py-3 text-[15px]" type="text" name="score" placeholder="예: 70점대, 4등급, 잘 모름" />
          </label>
        </section>

        <section class="border-t border-slate-100 pt-4">
          <h2 class="text-[18px] font-black text-ink">원하는 수업 방식</h2>
          <div class="mt-3 grid grid-cols-3 gap-2">
            <label>
              <input class="option-input hidden" type="radio" name="classType" value="방문 수업" />
              <span class="block rounded-[10px] border border-slate-200 px-2 py-3 text-center text-[14px] font-semibold text-slate-600">방문</span>
            </label>
            <label>
              <input class="option-input hidden" type="radio" name="classType" value="화상 수업" />
              <span class="block rounded-[10px] border border-slate-200 px-2 py-3 text-center text-[14px] font-semibold text-slate-600">화상</span>
            </label>
            <label>
              <input class="option-input hidden" type="radio" name="classType" value="상담 후 결정" checked />
              <span class="block rounded-[10px] border border-slate-200 px-2 py-3 text-center text-[14px] font-semibold text-slate-600">상담 후</span>
            </label>
          </div>
          <label class="mt-3 block">
            <span class="text-[14px] font-bold text-ink">가장 고민되는 부분 <b class="text-orange">*</b></span>
            <textarea class="field mt-2 min-h-[104px] w-full resize-none rounded-[10px] border border-slate-200 px-4 py-3 text-[15px]" name="concern" placeholder="예: 계산 실수가 많고 시험 시간이 부족합니다." required></textarea>
          </label>
        </section>

        <label class="flex items-start gap-2 rounded-[10px] bg-pale px-3 py-3">
          <input class="mt-1" type="checkbox" name="privacyAgree" value="동의" required />
          <span class="text-[13px] font-medium leading-[1.55] text-slate-600">
            상담 연락을 위해 입력한 정보를 수집·이용하는 것에 동의합니다.
          </span>
        </label>

        <button id="submitButton" type="submit" class="blue-gradient w-full rounded-[10px] px-5 py-4 text-[17px] font-black text-white shadow-soft">
          무료 학습 진단 신청하기
        </button>
        <p id="formMessage" class="hidden rounded-[10px] px-4 py-3 text-center text-[14px] font-bold"></p>
      </form>
    </main>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';

    const form = document.getElementById('consultForm');
    const button = document.getElementById('submitButton');
    const message = document.getElementById('formMessage');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'rounded-[10px] px-4 py-3 text-center text-[14px] font-bold';
      message.classList.add(type === 'success' ? 'bg-green-50' : 'bg-red-50');
      message.classList.add(type === 'success' ? 'text-green-700' : 'text-red-700');
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
        showMessage('관리자 설정이 필요합니다. Google Apps Script 웹앱 URL을 sinchung.html에 입력해 주세요.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = '접수 중입니다...';

      const formData = new FormData(form);
      formData.append('submittedAt', new Date().toISOString());
      formData.append('pageUrl', window.location.href);

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: formData
        });

        form.reset();
        showMessage('신청이 접수되었습니다. 확인 후 연락드리겠습니다.', 'success');
      } catch (error) {
        showMessage('접수 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', 'error');
      } finally {
        button.disabled = false;
        button.textContent = '무료 학습 진단 신청하기';
      }
    });
  </script>
</body>
</html>
